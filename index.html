<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7d61ff" />
  <title>記録</title>
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>記録</h1>
      <p>タップでカンタン記録</p>
    </header>

    <section class="record-panel">
      <div class="record-actions">
        <button id="recordButton" class="record-button">🌱 記録</button>
        <button id="painRecordButton" class="record-button pain-button">💥 記録</button>
      </div>
      <div id="statusMessage" class="status">まだ記録がありません。</div>
    </section>

    <div id="painModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-window">
        <h3>腹痛の強さを選択</h3>
        <div class="severity-grid">
          <button class="severity-option severity-light" data-level="1">軽い</button>
          <button class="severity-option severity-normal" data-level="2">普通</button>
          <button class="severity-option severity-strong" data-level="3">強い</button>
          <button class="severity-option severity-very-strong" data-level="4">非常に強い</button>
        </div>
        <button id="modalCancelButton" class="modal-cancel">キャンセル</button>
      </div>
    </div>

    <section class="calendar-panel">
      <h2>カレンダー</h2>
      <div id="calendar" class="calendar"></div>
      <div id="dayDetails" class="day-details">日付をタップしてその日の記録を確認できます。</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
